<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2>🚍 Transporte</h2>

    <div id="app" style="display: none;">

            <button class="menu-btn" onclick="toggleSidebar()">☰</button>

            </div>

        </div>

        <div class="main-content">
            <div class="search-container">
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="filtrarTabla()">
                </div>
            </div>
            <div id="table-container">
                <div class="loading">Cargando datos...</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-titulo">Agregar Registro</h3>
                <button class="modal-close" onclick="cerrarModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-campos"></div>
            <div class="modal-footer" id="modal-footer">
                <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
                <button type="button" class="btn-save" id="btnGuardar">Guardar</button>

    <script type="module">
        import { supabase } from './conexion.js';

        window.usuarioActual = null;
        window.permisos = null;
        window.tablaActual = null;
        window.datosActuales = [];
        window.editandoId = null;
        window.modalModo = 'form';

        const configPermisos = {
            master: {
                puedeEditar: ['usuarios', 'contratantes', 'subcontratantes', 'empresas', 'conductores', 'buses', 'ordenes', 'carpetas', 'cuentacorriente', 'pagos'],
                soloVer: []
            },
            administracion: {
                puedeEditar: ['pagos', 'cuentacorriente'],
                soloVer: ['ordenes', 'carpetas']
            },
            marketing: {
                puedeEditar: ['ordenes', 'contratantes', 'subcontratantes'],
                soloVer: ['carpetas', 'pagos', 'cuentacorriente']
            },
            trafico: {
                puedeEditar: ['ordenes', 'carpetas', 'buses', 'conductores', 'contratantes', 'subcontratantes'],
                soloVer: ['pagos', 'cuentacorriente']
            },
            contratante: {
                puedeEditar: [],
                soloVer: ['ordenes', 'carpetas']
            }
        };

        const todasLasTablas = [
            { id: 'empresas', nombre: '🏢 Empresas', soloLectura: true },
            { id: 'contratantes', nombre: '👤 Contratantes' },
            { id: 'subcontratantes', nombre: '📋 Subcontratantes' },
            { id: 'ordenes', nombre: '📦 Órdenes' },
            { id: 'carpetas', nombre: '📁 Carpetas' },
            { id: 'conductores', nombre: '🚌 Conductores' },
            { id: 'buses', nombre: '🚎 Buses' },
            { id: 'usuarios', nombre: '👥 Usuarios', soloLectura: false },
            { id: 'cuentacorriente', nombre: '🏦 Cuenta Corriente' },
            { id: 'pagos', nombre: '💸 Pagos' }
        ];

        window.relaciones = {
            ordenes: {
                empresas_id: { tabla: 'empresas', campo: 'nombre' },
                contratante_id: { tabla: 'contratantes', campo: 'contratante' },
                subcontratante: { tabla: 'subcontratantes', campo: 'subcontratante' },
                confecciono: { tabla: 'usuarios', campo: 'nombre' }
            },
            subcontratantes: {
                contratante: { tabla: 'contratantes', campo: 'contratante' }
            },
            carpetas: {
                orden_id: { tabla: 'ordenes', campo: 'id' },
                contratante_id: { tabla: 'contratantes', campo: 'contratante' },
                subcontratante_id: { tabla: 'subcontratantes', campo: 'subcontratante' },
                conductor1_id: { tabla: 'conductores', campo: 'nombre' },
                conductor2_id: { tabla: 'conductores', campo: 'nombre' },
                interno_id: { tabla: 'buses', campo: 'Interno' }
            },
            conductores: {
                empresa_id: { tabla: 'empresas', campo: 'nombre' }
            },
            buses: {
                empresa_id: { tabla: 'empresas', campo: 'nombre' }
            },
            cuentacorriente: {
                contratante_id: { tabla: 'contratantes', campo: 'contratante' },
                usuario_id: { tabla: 'usuarios', campo: 'nombre' }
            },
            pagos: {
                orden_id: { tabla: 'ordenes', campo: 'id' },
                usuario_id: { tabla: 'usuarios', campo: 'nombre' }
            },
            contratantes: {
                usuario_id: { tabla: 'usuarios', campo: 'nombre' }
            }
        };

        function mostrarToast(mensaje, esError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = esError ? '#ef4444' : '#10b981';
            toast.textContent = mensaje;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatearFecha(fecha) {
            if (!fecha) return '-';
            try {
                const date = new Date(fecha);
                return date.toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            } catch(e) {
                return fecha;
            }
        }

        function formatearFechaCorta(fecha) {
            if (!fecha) return '-';
            try {
                return new Date(fecha).toLocaleDateString('es-AR');
            } catch(e) {
                return fecha;
            }
        }

        function formatearMonto(monto) {
            if (!monto && monto !== 0) return '-';
            return new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'ARS',
                minimumFractionDigits: 0
            }).format(monto);
        }

        async function getKmDisponiblesPorContratante(contratanteId) {
            if (!contratanteId) return 0;
            
            const { data: compras, error: err1 } = await supabase
                .from('cuentacorriente')
                .select('kmcomprados')
                .eq('contratante_id', contratanteId);
            
            if (err1) return 0;
            
            const totalComprados = compras?.reduce((sum, c) => sum + (parseInt(c.kmcomprados) || 0), 0) || 0;
            
            const { data: subcontratantes, error: errSub } = await supabase
                .from('subcontratantes')
                .select('id')
                .eq('contratante', contratanteId);
            
            if (errSub) return totalComprados;
            
            const subcontratantesIds = subcontratantes?.map(s => s.id) || [];
            
            if (subcontratantesIds.length === 0) return totalComprados;
            
            const { data: ordenesCC, error: err2 } = await supabase
                .from('ordenes')
                .select('km_descontados')
                .in('subcontratante', subcontratantesIds)
                .eq('forma_pago', 'cuenta_corriente');
            
            if (err2) return totalComprados;
            
            const totalDescontados = ordenesCC?.reduce((sum, o) => sum + (parseInt(o.km_descontados) || 0), 0) || 0;
            
            return totalComprados - totalDescontados;
        }

        async function getSaldoOrden(ordenId, cotizacion) {
            if (!ordenId) return 0;
            
            const { data: pagos, error } = await supabase
                .from('pagos')
                .select('monto')
                .eq('orden_id', ordenId);
            
            if (error) return cotizacion || 0;
            
            const totalPagado = pagos?.reduce((sum, p) => sum + (parseFloat(p.monto) || 0), 0) || 0;
            const saldo = (parseFloat(cotizacion) || 0) - totalPagado;
            
            return saldo;
        }

        async function validarLimiteCarpetas(ordenId, carpetaIdActual = null) {
            if (!ordenId) return { valido: true };
            
            const { data: orden, error } = await supabase
                .from('ordenes')
                .select('cantidad_buses')
                .eq('id', ordenId)
                .single();
            
            if (error || !orden) {
                return { valido: false, mensaje: 'No se pudo verificar la orden' };
            }
            
            const cantidadBuses = parseInt(orden.cantidad_buses) || 0;
            
            if (cantidadBuses === 0) {
                return { valido: true };
            }
            
            let query = supabase
                .from('carpetas')
                .select('id', { count: 'exact', head: true })
                .eq('orden_id', ordenId);
            
            if (carpetaIdActual) {
                query = query.neq('id', carpetaIdActual);
            }
            
            const { count, error: countError } = await query;
            
            if (countError) {
                return { valido: false, mensaje: 'Error al verificar carpetas existentes' };
            }
            
            if (count >= cantidadBuses) {
                return { 
                    valido: false, 
                    mensaje: `⚠️ Esta orden tiene ${cantidadBuses} bus(es) y ya tiene ${count} carpeta(s) creada(s). No puede crear más carpetas.`
                };
            }
            
            return { valido: true };
        }

        async function filtrarPorContratante(data, tabla) {
            if (window.usuarioActual?.nivel !== 'contratante') return data;
            
            const { data: contratanteData } = await supabase
                .from('contratantes')
                .select('id')
                .eq('usuario_id', window.usuarioActual.id)
                .single();
            
            if (!contratanteData) return [];
            
            const { data: subcontratantesData } = await supabase
                .from('subcontratantes')
                .select('id')
                .eq('contratante', contratanteData.id);
            
            const subcontratantesIds = subcontratantesData?.map(s => s.id) || [];
            
            if (subcontratantesIds.length === 0) return [];
            
            if (tabla === 'ordenes') {
                return data.filter(item => subcontratantesIds.includes(item.subcontratante));
            }
            if (tabla === 'carpetas') {
                return data.filter(item => subcontratantesIds.includes(item.subcontratante_id));
            }
            return data;
        }

        function getTablasPermitidas() {
            if (!window.permisos) return [];
            const permitidas = [];
            
            window.permisos.puedeEditar.forEach(tabla => {
                const info = todasLasTablas.find(t => t.id === tabla);
                if (info) permitidas.push({ ...info, puedeEditar: true });
            });
            
            window.permisos.soloVer.forEach(tabla => {
                const info = todasLasTablas.find(t => t.id === tabla);
                if (info && !permitidas.find(p => p.id === tabla)) {
                    permitidas.push({ ...info, puedeEditar: false });
                }
            });
            
            return permitidas;
        }

        async function enriquecerCarpetasConOrden(data) {
            for (let item of data) {
                if (item.orden_id) {
                    const { data: orden } = await supabase
                        .from('ordenes')
                        .select('origen, destino')
                        .eq('id', item.orden_id)
                        .single();
                    if (orden) {
                        item.origen = orden.origen;
                        item.destino = orden.destino;
                    }
                }
            }
            return data;
        }

        window.cargarTabla = async (tabla) => {
            if (!puedeVerTabla(tabla)) {
                mostrarToast('No tiene permiso para ver esta tabla', true);
                return;
            }
            
            window.tablaActual = tabla;
            const puedeEditar = puedeEditarTabla(tabla);
            
            let titulo = tabla.charAt(0).toUpperCase() + tabla.slice(1);
            if (tabla === 'ordenes') titulo = '📦 Órdenes';
            if (tabla === 'carpetas') titulo = '📁 Carpetas';
            document.getElementById('titulo-tabla').innerHTML = titulo;
            document.getElementById('searchInput').value = '';
            
            const addBtn = document.getElementById('addBtnGlobal');
            if (addBtn) {
                addBtn.style.display = puedeEditar ? 'flex' : 'none';
            }
            
            toggleSidebar();
            document.getElementById('table-container').innerHTML = '<div class="loading">Cargando datos...</div>';
            
            try {
                let { data, error } = await supabase.from(tabla).select('*');
                if (error) throw error;
                
                data = await filtrarPorContratante(data, tabla);
                
                if (tabla === 'carpetas') {
                    data = await enriquecerCarpetasConOrden(data);
                }
                
                if (window.relaciones[tabla]) {
                    for (let item of data) {
                        for (let [campoId, relacion] of Object.entries(window.relaciones[tabla])) {
                            if (item[campoId]) {
                                const { data: relacionData } = await supabase
                                    .from(relacion.tabla)
                                    .select(relacion.campo)
                                    .eq('id', item[campoId])
                                    .single();
                                if (relacionData) {
                                    item[`${campoId}_nombre`] = relacionData[relacion.campo];
                                }
                            }
                        }
                    }
                }
                
                window.datosActuales = data;
                renderizarTabla(puedeEditar);
            } catch (error) {
                console.error(error);
                document.getElementById('table-container').innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        };

        window.filtrarTabla = () => {
            const puedeEditar = puedeEditarTabla(window.tablaActual);
            renderizarTabla(puedeEditar);
        };

        function renderizarTabla(puedeEditar) {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            let datosFiltrados = window.datosActuales;
            
            if (searchText) {
                datosFiltrados = window.datosActuales.filter(item => {
                    return JSON.stringify(Object.values(item)).toLowerCase().includes(searchText);
                });
            }
            
            if (!datosFiltrados || datosFiltrados.length === 0) {
                document.getElementById('table-container').innerHTML = `
                    <div class="empty-state">
                        <span>📭</span>
                        <p>No hay datos disponibles</p>
                    </div>
                `;
                return;
            }
            
            let columnas;
            let esContratantes = false;
            let esOrdenes = false;
            
            if (window.tablaActual === 'carpetas') {
                columnas = ['id', 'orden_id', 'micro_num', 'contacto', 'obs_antes_iniciar', 'conductor1_id', 'conductor2_id', 'interno_id'];
            } else if (window.tablaActual === 'ordenes') {
                columnas = ['id', 'empresas_id', 'contratante_id', 'subcontratante', 'fecha_ida', 'origen', 'destino', 'cantidad_buses', 'cotizacion', 'forma_pago', 'confecciono'];
                esOrdenes = true;
            } else if (window.tablaActual === 'contratantes') {
                columnas = ['id', 'contratante', 'telefono_cont', 'cuit', 'usuario_id'];
                esContratantes = true;
            } else {
                columnas = Object.keys(datosFiltrados[0]).filter(key => 
                    key !== 'created_at' && !key.includes('_nombre')
                );
            }
            
            let html = `<div class="table-wrapper"><table class="data-table"><thead><tr>`;
            
            const nombresColumnas = {
                id: 'ID',
                orden_id: 'ORDEN ID',
                micro_num: 'MICRO NUM',
                contacto: 'CONTACTO',
                obs_antes_iniciar: 'OBS ANTES DE INICIAR',
                conductor1_id: 'CONDUCTOR 1',
                conductor2_id: 'CONDUCTOR 2',
                interno_id: 'INTERNO ID',
                empresas_id: 'EMPRESA',
                contratante_id: 'CONTRATANTE',
                subcontratante: 'SUBCONTRATANTE',
                fecha_ida: 'FECHA IDA',
                cantidad_buses: 'CANT. BUSES',
                cotizacion: 'COTIZACIÓN',
                forma_pago: 'FORMA PAGO',
                confecciono: 'CONFECCIONÓ',
                contratante: 'CONTRATANTE',
                telefono_cont: 'TELÉFONO',
                cuit: 'CUIT',
                usuario_id: 'USUARIO ASIGNADO'
            };
            
            columnas.forEach(col => {
                let nombreMostrar = nombresColumnas[col] || col.replace(/_/g, ' ').toUpperCase();
                html += `<th>${nombreMostrar}</th>`;
            });
            
            if (esContratantes) {
                html += `<th>📊 KM DISPONIBLES</th>`;
            }
            
            if (esOrdenes) {
                html += `<th>💰 SALDO</th>`;
            }
            
            html += `<th>ACCIONES</th></tr></thead><tbody>`;
            
            (async () => {
                for (let item of datosFiltrados) {
                    html += '<tr>';
                    for (let col of columnas) {
                        let valor = item[col];
                        
                        if (window.relaciones[window.tablaActual] && window.relaciones[window.tablaActual][col]) {
                            if (item[`${col}_nombre`]) {
                                valor = item[`${col}_nombre`];
                            }
                        }
                        
                        if (col.includes('fecha') && valor) {
                            valor = formatearFechaCorta(valor);
                        }
                        
                        if (col === 'cotizacion' && valor) {
                            valor = formatearMonto(valor);
                        }
                        
                        if (col === 'forma_pago') {
                            valor = valor === 'cuenta_corriente' ? '🏦 CC' : '💵 Directo';
                        }
                        
                        if (typeof valor === 'string' && valor.length > 40) {
                            valor = valor.substring(0, 40) + '...';
                        }
                        
                        html += `<td>${valor !== null && valor !== undefined ? valor : '-'}</td>`;
                    }
                    
                    if (esContratantes) {
                        const kmDisponibles = await getKmDisponiblesPorContratante(item.id);
                        const kmColor = kmDisponibles > 0 ? '#10b981' : (kmDisponibles < 0 ? '#ef4444' : '#64748b');
                        html += `<td style="font-weight:bold; color:${kmColor};">${kmDisponibles} km<\/td>`;
                    }
                    
                    if (esOrdenes) {
                        const saldo = await getSaldoOrden(item.id, item.cotizacion);
                        const saldoFormateado = formatearMonto(Math.abs(saldo));
                        const saldoClase = saldo > 0 ? 'saldo-rojo' : (saldo < 0 ? 'saldo-verde' : '');
                        const saldoTexto = saldo > 0 ? `- ${saldoFormateado}` : (saldo < 0 ? `✓ ${saldoFormateado}` : '✓ SALDADO');
                        html += `<td class="${saldoClase}" style="font-weight:bold;">${saldoTexto}<\/td>`;
                    }
                    
                    if (window.tablaActual === 'ordenes') {
                        html += `<td class="actions-cell">
                                    <button class="btn-report" onclick="verInformeOrden(${item.id})">📄 Ver Informe</button>
                                    ${puedeEditar ? `<button class="btn-edit" onclick="editarRegistro(${item.id})">✏️</button>` : ''}
                                    ${puedeEditar ? `<button class="btn-delete" onclick="eliminarRegistro(${item.id})">🗑️</button>` : ''}
                                  <\/td>`;
                    } else if (window.tablaActual === 'carpetas') {
                        html += `<td class="actions-cell">
                                    <button class="btn-view" onclick="verDetalleCarpeta(${item.id})">📋 Ver Hoja</button>
                                    ${puedeEditar ? `<button class="btn-edit" onclick="editarRegistro(${item.id})">✏️</button>` : ''}
                                    ${puedeEditar ? `<button class="btn-delete" onclick="eliminarRegistro(${item.id})">🗑️</button>` : ''}
                                  <\/td>`;
                    } else if (puedeEditar) {
                        html += `<td class="actions-cell">
                                    <button class="btn-edit" onclick="editarRegistro(${item.id})">Editar</button>
                                    <button class="btn-delete" onclick="eliminarRegistro(${item.id})">Eliminar</button>
                                  <\/td>`;
                    } else {
                        html += `<td class="actions-cell">
                                    <span style="color:#94a3b8; font-size:0.7rem;">Solo lectura</span>
                                  <\/td>`;
                    }
                    html += '</tr>';
                }
                
                html += '</tbody></table></div>';
                document.getElementById('table-container').innerHTML = html;
            })();
        }

        window.mostrarModalAgregar = async () => {
            if (!puedeEditarTabla(window.tablaActual)) {
                mostrarToast('No tiene permiso para agregar registros', true);
                return;
            }
            
            window.modalModo = 'form';
            window.editandoId = null;
            document.getElementById('modal-titulo').textContent = `Agregar ${window.tablaActual}`;
            document.getElementById('modal-footer').style.display = 'flex';
            await cargarFormulario();
            document.getElementById('modal').classList.add('show');
        };

        window.editarRegistro = async (id) => {
            if (!puedeEditarTabla(window.tablaActual)) {
                mostrarToast('No tiene permiso para editar', true);
                return;
            }
            window.modalModo = 'form';
            window.editandoId = id;
            document.getElementById('modal-titulo').textContent = `Editar ${window.tablaActual}`;
            document.getElementById('modal-footer').style.display = 'flex';
            const registro = window.datosActuales.find(r => r.id === id);
            if (registro) {
                await cargarFormulario(registro);
                document.getElementById('modal').classList.add('show');
            }
        };

        async function cargarFormulario(registro = null) {
            const container = document.getElementById('modal-campos');
            
            const { data: columnas, error } = await supabase
                .from(window.tablaActual)
                .select('*')
                .limit(1);
            
            if (error) {
                console.error('Error al obtener columnas:', error);
                container.innerHTML = '<p>Error cargando formulario. Recargue la página.</p>';
                return;
            }
            
            if (!columnas || columnas.length === 0) {
                container.innerHTML = '<p>No se encontraron columnas para la tabla. Verifique que la tabla exista.</p>';
                return;
            }
            
            const estructura = Object.keys(columnas[0]).filter(key => key !== 'id' && key !== 'created_at');
            
            let camposOrdenados = estructura;
            if (window.tablaActual === 'ordenes') {
                const ordenPersonalizado = [
                    'contratante_id',
                    'subcontratante',
                    'empresas_id',
                    'fecha_ida',
                    'hora_ida',
                    'direccion_origen',
                    'origen',
                    'direccion_destino',
                    'destino',
                    'fecha_regreso',
                    'hora_regreso',
                    'paradas',
                    'movimientos',
                    'cantidad_buses',
                    'obs_buses',
                    'cotizacion',
                    'kilometros',
                    'obs_cotizacion',
                    'comidas',
                    'alojamiento',
                    'obs_gastos',
                    'forma_pago',
                    'km_descontados'
                ];
                camposOrdenados = ordenPersonalizado.filter(campo => estructura.includes(campo));
                for (let campo of estructura) {
                    if (!camposOrdenados.includes(campo)) {
                        camposOrdenados.push(campo);
                    }
                }
            }
            
            // Para carpetas: selector de orden + datos de la orden como etiquetas + campos editables
            if (window.tablaActual === 'carpetas') {
                let ordenIdSeleccionado = registro ? registro.orden_id : '';
                
                // Selector de orden
                const { data: ordenes } = await supabase
                    .from('ordenes')
                    .select('id')
                    .order('id', { ascending: false });
                
                html = `<div class="form-group">
                            <label>ORDEN DE VIAJE</label>
                            <select id="field_orden_id" onchange="cargarDatosOrdenEnFormulario(this.value)">
                                <option value="">Seleccionar orden...</option>`;
                if (ordenes) {
                    for (let ord of ordenes) {
                        const selected = (ordenIdSeleccionado == ord.id) ? 'selected' : '';
                        html += `<option value="${ord.id}" ${selected}>Orden N° ${ord.id}</option>`;
                    }
                }
                html += `</select>
                        </div>`;
                
                // Datos de la orden (solo lectura)
                html += `<div style="background:#f0fdf4; border-radius:12px; padding:12px; margin-bottom:16px;">
                            <h4 style="color:#166534; margin-bottom:8px;">📋 DATOS DE LA ORDEN</h4>
                            <div class="readonly-field"><label>EMPRESA</label><div class="value" id="info_empresa">-</div></div>
                            <div class="readonly-field"><label>CONTRATANTE</label><div class="value" id="info_contratante">-</div></div>
                            <div class="readonly-field"><label>SUBCONTRATANTE</label><div class="value" id="info_subcontratante">-</div></div>
                            <div class="readonly-field"><label>FECHA IDA</label><div class="value" id="info_fecha_ida">-</div></div>
                            <div class="readonly-field"><label>ORIGEN</label><div class="value" id="info_origen">-</div></div>
                            <div class="readonly-field"><label>DESTINO</label><div class="value" id="info_destino">-</div></div>
                            <div class="readonly-field"><label>FECHA REGRESO</label><div class="value" id="info_fecha_regreso">-</div></div>
                        </div>`;
                
                // Campos editables de la carpeta
                html += `<h4 style="margin:16px 0 8px; color:#1e293b;">📁 DATOS DE LA CARPETA</h4>`;
                
                // MICRO NUM
                html += `<div class="form-group">
                            <label>MICRO NUM</label>
                            <input type="text" name="micro_num" value="${registro?.micro_num || ''}" placeholder="Número de micro">
                        </div>`;
                
                // CONTACTO
                html += `<div class="form-group">
                            <label>CONTACTO</label>
                            <input type="text" name="contacto" value="${registro?.contacto || ''}" placeholder="Contacto">
                        </div>`;
                
                // OBSERVACIONES
                html += `<div class="form-group">
                            <label>OBSERVACIONES ANTES DE INICIAR</label>
                            <textarea name="obs_antes_iniciar" rows="3" placeholder="Observaciones antes de iniciar el viaje">${registro?.obs_antes_iniciar || ''}</textarea>
                        </div>`;
                
                // CONDUCTOR 1
                const { data: conductores } = await supabase.from('conductores').select('id, nombre').order('nombre');
                html += `<div class="form-group">
                            <label>CONDUCTOR 1</label>
                            <select name="conductor1_id">`;
                html += `<option value="">Seleccionar conductor...</option>`;
                if (conductores) {
                    for (let c of conductores) {
                        const selected = (registro?.conductor1_id == c.id) ? 'selected' : '';
                        html += `<option value="${c.id}" ${selected}>${c.nombre}</option>`;
                    }
                }
                html += `</select></div>`;
                
                // CONDUCTOR 2
                html += `<div class="form-group">
                            <label>CONDUCTOR 2</label>
                            <select name="conductor2_id">`;
                html += `<option value="">Seleccionar conductor...</option>`;
                if (conductores) {
                    for (let c of conductores) {
                        const selected = (registro?.conductor2_id == c.id) ? 'selected' : '';
                        html += `<option value="${c.id}" ${selected}>${c.nombre}</option>`;
                    }
                }
                html += `</select></div>`;
                
                // INTERNO ID
                const { data: buses } = await supabase.from('buses').select('id, Interno, Dominio').order('Interno');
                html += `<div class="form-group">
                            <label>INTERNO / BUS</label>
                            <select name="interno_id">`;
                html += `<option value="">Seleccionar interno...</option>`;
                if (buses) {
                    for (let b of buses) {
                        const selected = (registro?.interno_id == b.id) ? 'selected' : '';
                        html += `<option value="${b.id}" ${selected}>Interno ${b.Interno} - Dominio ${b.Dominio}</option>`;
                    }
                }
                html += `</select></div>`;
                
                container.innerHTML = html;
                
                // Si estamos editando, cargar los datos de la orden seleccionada
                if (registro && registro.orden_id) {
                    await cargarDatosOrdenEnFormulario(registro.orden_id);
                }
                
                return;
            }
            
            // Para las demás tablas, mantener el código original
            let htmlForm = '';
            for (let col of camposOrdenados) {
                let valor = registro ? registro[col] : '';
                let label = col.replace(/_/g, ' ').toUpperCase();
                
                if (window.tablaActual === 'ordenes' && col === 'contratante_id') {
                    const { data: contratantes } = await supabase
                        .from('contratantes')
                        .select('id, contratante')
                        .order('contratante');
                    
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label}</label>`;
                    htmlForm += `<select name="${col}" id="field_contratante_id" onchange="onContratanteChange()">`;
                    htmlForm += `<option value="">Seleccionar contratante...</option>`;
                    if (contratantes) {
                        for (let c of contratantes) {
                            const selected = (valor == c.id) ? 'selected' : '';
                            htmlForm += `<option value="${c.id}" ${selected}>${c.contratante}</option>`;
                        }
                    }
                    htmlForm += `</select></div>`;
                }
                else if (window.tablaActual === 'ordenes' && col === 'subcontratante') {
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label}</label>`;
                    htmlForm += `<select name="${col}" id="field_subcontratante">`;
                    htmlForm += `<option value="">Primero seleccione un contratante</option>`;
                    htmlForm += `</select></div>`;
                }
                else if (window.tablaActual === 'contratantes' && col === 'usuario_id') {
                    const { data: usuarios } = await supabase
                        .from('usuarios')
                        .select('id, nombre, usuario')
                        .order('nombre');
                    
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label}</label>`;
                    htmlForm += `<select name="${col}" id="field_usuario_id">`;
                    htmlForm += `<option value="">Seleccionar usuario...</option>`;
                    if (usuarios) {
                        for (let u of usuarios) {
                            const selected = (valor == u.id) ? 'selected' : '';
                            htmlForm += `<option value="${u.id}" ${selected}>${u.nombre} (${u.usuario})</option>`;
                        }
                    }
                    htmlForm += `</select></div>`;
                }
                else if (col === 'forma_pago') {
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label}</label>`;
                    htmlForm += `<select name="${col}" id="forma_pago_select" onchange="actualizarKmDescontados()">`;
                    htmlForm += `<option value="pago_directo" ${valor === 'pago_directo' ? 'selected' : ''}>💵 Pago Directo</option>`;
                    htmlForm += `<option value="cuenta_corriente" ${valor === 'cuenta_corriente' ? 'selected' : ''}>🏦 Cuenta Corriente (descuenta KM)</option>`;
                    htmlForm += `</select></div>`;
                } 
                else if (col === 'km_descontados') {
                    const hiddenStyle = (registro?.forma_pago === 'cuenta_corriente') ? '' : 'style="display:none;"';
                    htmlForm += `<div class="form-group" id="km_descontados_group" ${hiddenStyle}>`;
                    htmlForm += `<label>${label} (KM a descontar)</label>`;
                    htmlForm += `<input type="number" name="${col}" id="field_km_descontados" value="${valor || 0}" step="1" min="0" readonly style="background-color:#f0f0f0;">`;
                    htmlForm += `</div>`;
                }
                else if (col === 'kilometros') {
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label} (KM del viaje)</label>`;
                    htmlForm += `<input type="number" name="${col}" id="field_kilometros" value="${valor || 0}" step="1" min="0" onchange="actualizarKmDescontados()">`;
                    htmlForm += `</div>`;
                }
                else if (window.relaciones[window.tablaActual] && window.relaciones[window.tablaActual][col]) {
                    const relacion = window.relaciones[window.tablaActual][col];
                    const { data: opciones } = await supabase.from(relacion.tabla).select('*');
                    
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label}</label>`;
                    htmlForm += `<select name="${col}" id="field_${col}">`;
                    htmlForm += `<option value="">Seleccionar...</option>`;
                    if (opciones) {
                        for (let op of opciones) {
                            const selected = valor == op.id ? 'selected' : '';
                            const displayValue = op[relacion.campo] || op.nombre || op.contratante || op.id;
                            htmlForm += `<option value="${op.id}" ${selected}>${displayValue}</option>`;
                        }
                    }
                    htmlForm += `</select>`;
                    htmlForm += `</div>`;
                } else if (col.includes('fecha')) {
                    let fechaValor = valor ? new Date(valor).toISOString().split('T')[0] : '';
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label}</label>`;
                    htmlForm += `<input type="date" name="${col}" value="${fechaValor}">`;
                    htmlForm += `</div>`;
                } else if (col.includes('hora')) {
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label}</label>`;
                    htmlForm += `<input type="time" name="${col}" value="${valor || ''}">`;
                    htmlForm += `</div>`;
                } else {
                    htmlForm += `<div class="form-group">`;
                    htmlForm += `<label>${label}</label>`;
                    if (col.includes('obs')) {
                        htmlForm += `<textarea name="${col}" rows="3">${valor || ''}</textarea>`;
                    } else {
                        htmlForm += `<input type="${col === 'cotizacion' || col === 'monto' ? 'number' : 'text'}" name="${col}" value="${valor || ''}" step="${col === 'cotizacion' ? '0.01' : 'any'}">`;
                    }
                    htmlForm += `</div>`;
                }
            }
            
            container.innerHTML = htmlForm;
            
            setTimeout(() => {
                const kmInput = document.getElementById('field_kilometros');
                const formaPagoSelect = document.getElementById('forma_pago_select');
                
                if (formaPagoSelect) {
                    formaPagoSelect.addEventListener('change', actualizarKmDescontados);
                }
                if (kmInput) {
                    kmInput.addEventListener('change', actualizarKmDescontados);
                    kmInput.addEventListener('input', actualizarKmDescontados);
                }
                
                if (window.tablaActual === 'ordenes' && registro) {
                    const contratanteId = registro.contratante_id;
                    const subcontratanteId = registro.subcontratante;
                    if (contratanteId) {
                        cargarSubcontratantesPorContratante(contratanteId, subcontratanteId);
                    }
                }
                
                actualizarKmDescontados();
            }, 50);
        }

        window.cargarDatosOrdenEnFormulario = cargarDatosOrdenEnFormulario;
        window.onContratanteChange = async () => {
            const contratanteSelect = document.getElementById('field_contratante_id');
            const contratanteId = contratanteSelect ? contratanteSelect.value : null;
            await cargarSubcontratantesPorContratante(contratanteId);
        };

        window.actualizarKmDescontados = actualizarKmDescontados;

        const btnGuardar = document.getElementById('btnGuardar');
        if (btnGuardar) {
            btnGuardar.onclick = async () => {
                if (!puedeEditarTabla(window.tablaActual)) {
                    mostrarToast('No tiene permiso para modificar', true);
                    cerrarModal();
                    return;
                }
                
                const formFields = document.querySelectorAll('#modal-campos input, #modal-campos select, #modal-campos textarea');
                const datos = {};
                
                for (let field of formFields) {
                    let value = field.value;
                    let name = field.name;
                    
                    if (value && value.toString().trim()) {
                        if (name === 'cotizacion' || name === 'monto') {
                            datos[name] = parseFloat(value);
                        } else if (name === 'km_descontados' || name === 'kilometros') {
                            datos[name] = parseInt(value) || 0;
                        } else {
                            datos[name] = value;
                        }
                    } else if (name === 'km_descontados' || name === 'kilometros') {
                        datos[name] = 0;
                    }
                }
                
                // Para carpetas, agregar el orden_id seleccionado
                if (window.tablaActual === 'carpetas') {
                    const ordenSelect = document.getElementById('field_orden_id');
                    if (ordenSelect && ordenSelect.value) {
                        datos.orden_id = parseInt(ordenSelect.value);
                    } else {
                        mostrarToast('Debe seleccionar una orden de viaje', true);
                        return;
                    }
                }
                
                if (window.tablaActual === 'ordenes') {
                    datos.confecciono = window.usuarioActual.id;
                }
                
                if (window.tablaActual === 'carpetas' && datos.orden_id) {
                    const validacion = await validarLimiteCarpetas(datos.orden_id, window.editandoId);
                    if (!validacion.valido) {
                        mostrarToast(validacion.mensaje, true);
                        return;
                    }
                }
                
                if (window.tablaActual === 'cuentacorriente' || window.tablaActual === 'pagos') {
                    datos.usuario_id = window.usuarioActual.id;
                }
                
                try {
                    if (window.editandoId) {
                        const { error } = await supabase
                            .from(window.tablaActual)
                            .update(datos)
                            .eq('id', window.editandoId);
                        if (error) throw error;
                        mostrarToast('✅ Registro actualizado');
                    } else {
                        const { error } = await supabase
                            .from(window.tablaActual)
                            .insert([datos]);
                        if (error) throw error;
                        mostrarToast('✅ Registro agregado');
                    }
                    cerrarModal();
                    window.cargarTabla(window.tablaActual);
                } catch (error) {
                    console.error('Error al guardar:', error);
                    mostrarToast('❌ Error: ' + error.message, true);
                }
            };
        }

        window.eliminarRegistro = async (id) => {
            if (!puedeEditarTabla(window.tablaActual)) {
                mostrarToast('No tiene permiso para eliminar', true);
                return;
            }
            
            if (confirm('¿Eliminar este registro?')) {
                const { error } = await supabase
                    .from(window.tablaActual)
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    mostrarToast('Error: ' + error.message, true);
                } else {
                    mostrarToast('Registro eliminado');
                    window.cargarTabla(window.tablaActual);
                }
            }
        };

        window.cerrarModal = () => {
            document.getElementById('modal').classList.remove('show');
            window.editandoId = null;
            window.modalModo = 'form';
            document.getElementById('modal-footer').style.display = 'flex';
        };

        window.verDetalleCarpeta = async (carpetaId) => {
            try {
                mostrarToast('Cargando hoja de ruta...');
                
                const { data: carpeta, error } = await supabase
                    .from('carpetas')
                    .select('*')
                    .eq('id', carpetaId)
                    .single();
                
                if (error) throw error;
                
                const { data: orden, error: errOrden } = await supabase
                    .from('ordenes')
                    .select('*, empresas(nombre), subcontratantes(subcontratante, telefono), contratantes(contratante, cuit)')
                    .eq('id', carpeta.orden_id)
                    .single();
                
                if (errOrden) throw errOrden;
                
                let conductor1 = { legajo: '-', dni: '-', vto_reg: '-', nombre: '-' };
                if (carpeta.conductor1_id) {
                    const { data: c1 } = await supabase
                        .from('conductores')
                        .select('legajo, dni, vto_reg, nombre')
                        .eq('id', carpeta.conductor1_id)
                        .single();
                    if (c1) conductor1 = c1;
                }
                
                let conductor2 = { legajo: '-', dni: '-', vto_reg: '-', nombre: '-' };
                if (carpeta.conductor2_id) {
                    const { data: c2 } = await supabase
                        .from('conductores')
                        .select('legajo, dni, vto_reg, nombre')
                        .eq('id', carpeta.conductor2_id)
                        .single();
                    if (c2) conductor2 = c2;
                }
                
                let bus = { Dominio: '-', Capacidad: '-', Interno: '-' };
                if (carpeta.interno_id) {
                    const { data: b } = await supabase
                        .from('buses')
                        .select('Dominio, Capacidad, Interno')
                        .eq('id', carpeta.interno_id)
                        .single();
                    if (b) bus = b;
                }
                
                const vtoReg1 = conductor1.vto_reg ? formatearFechaCorta(conductor1.vto_reg) : '-';
                const vtoReg2 = conductor2.vto_reg ? formatearFechaCorta(conductor2.vto_reg) : '-';
                
                const paradasTexto = orden.paradas || '';
                const movimientosTexto = orden.movimientos || '';
                
                const hojaHtml = `
                    <div class="reporte">
                        <div class="reporte-header">
                            <h2>${orden.empresas?.nombre || 'EMPRESA'}</h2>
                            <div class="subtitle">ORDEN DE VIAJE N° ${orden.id} | CARPETA ID: ${carpeta.id}</div>
                            <div class="subtitle">MICRO: ${carpeta.micro_num || '-'}</div>
                        </div>
                        
                        <div class="reporte-section">
                            <div class="reporte-section-title">📋 CONTRATANTE</div>
                            <div class="reporte-row"><span class="reporte-label">Contratante:</span><span class="reporte-value">${orden.contratantes?.contratante || '-'}</span></div>
                            <div class="reporte-row"><span class="reporte-label">CUIT:</span><span class="reporte-value">${orden.contratantes?.cuit || '-'}</span></div>
                            <div class="reporte-row"><span class="reporte-label">Subcontratante:</span><span class="reporte-value">${orden.subcontratantes?.subcontratante || '-'}</span></div>
                            <div class="reporte-row"><span class="reporte-label">Contacto:</span><span class="reporte-value">${carpeta.contacto || orden.subcontratantes?.telefono || '-'}</span></div>
                        </div>
                        
                        <div class="reporte-section">
                            <div class="reporte-section-title">⚠️ OBSERVACIONES ANTES DE INICIAR</div>
                            <div class="reporte-value" style="font-style:italic;">${carpeta.obs_antes_iniciar || 'Sin observaciones'}</div>
                        </div>
                        
                        <div class="reporte-section viaje-destacado">
                            <div class="reporte-section-title">🚌 IDA</div>
                            <div class="reporte-row"><span class="reporte-label">📅 Fecha:</span><span class="reporte-value">${formatearFecha(orden.fecha_ida)}</span></div>
                            <div class="reporte-row"><span class="reporte-label">⏰ Hora:</span><span class="reporte-value">${orden.hora_ida || '-'}</span></div>
                            <div class="reporte-row"><span class="reporte-label">📍 Dirección Origen:</span><span class="reporte-value">${orden.direccion_origen || '-'}</span></div>
                            <div class="reporte-row"><span class="reporte-label">🏁 Origen:</span><span class="reporte-value">${orden.origen || '-'}</span></div>
                            <div class="reporte-row"><span class="reporte-label">📍 Dirección Destino:</span><span class="reporte-value">${orden.direccion_destino || '-'}</span></div>
                            <div class="reporte-row"><span class="reporte-label">🏁 Destino:</span><span class="reporte-value">${orden.destino || '-'}</span></div>
                        </div>
                        
                        <div class="reporte-section viaje-destacado">
                            <div class="reporte-section-title">🔄 REGRESO</div>
                            <div class="reporte-row"><span class="reporte-label">📅 Fecha:</span><span class="reporte-value">${formatearFecha(orden.fecha_regreso)}</span></div>
                            <div class="reporte-row"><span class="reporte-label">⏰ Hora:</span><span class="reporte-value">${orden.hora_regreso || '-'}</span></div>
                        </div>
                        
                        <div class="reporte-section">
                            <div class="reporte-section-title">📍 PARADAS</div>
                            <div class="texto-fijo-reporte ${!paradasTexto ? 'vacio' : ''}">
                                ${paradasTexto || '__________________________________________________\n__________________________________________________\n__________________________________________________'}
                            </div>
                        </div>
                        
                        <div class="reporte-section">
                            <div class="reporte-section-title">🔄 MOVIMIENTOS</div>
                            <div class="texto-fijo-reporte ${!movimientosTexto ? 'vacio' : ''}">
                                ${movimientosTexto || '__________________________________________________\n__________________________________________________\n__________________________________________________'}
                            </div>
                        </div>
                        
                        <div class="reporte-section">
                            <div class="reporte-section-title">🍽️ COMIDAS Y ALOJAMIENTO</div>
                            <div class="reporte-row"><span class="reporte-label">Comidas:</span><span class="reporte-value">${orden.comidas || '-'}</span></div>
                            <div class="reporte-row"><span class="reporte-label">Alojamiento:</span><span class="reporte-value">${orden.alojamiento || '-'}</span></div>
                        </div>
                        
                        <div class="reporte-section">
                            <div class="reporte-section-title">🚎 INTERNO / BUS</div>
                            <div class="reporte-row"><span class="reporte-label">Interno:</span><span class="reporte-value">${bus.Interno}</span></div>
                            <div class="reporte-row"><span class="reporte-label">Dominio:</span><span class="reporte-value">${bus.Dominio}</span></div>
                            <div class="reporte-row"><span class="reporte-label">Capacidad:</span><span class="reporte-value">${bus.Capacidad}</span></div>
                        </div>
                        
                        <div class="reporte-grid-2">
                            <div class="conductor-box">
                                <h5>🚌 CONDUCTOR 1</h5>
                                <div class="reporte-row"><span class="reporte-label">Nombre:</span><span>${conductor1.nombre}</span></div>
                                <div class="reporte-row"><span class="reporte-label">Legajo:</span><span>${conductor1.legajo}</span></div>
                                <div class="reporte-row"><span class="reporte-label">DNI:</span><span>${conductor1.dni}</span></div>
                                <div class="reporte-row"><span class="reporte-label">Vto Reg:</span><span>${vtoReg1}</span></div>
                            </div>
                            <div class="conductor-box">
                                <h5>🚌 CONDUCTOR 2</h5>
                                <div class="reporte-row"><span class="reporte-label">Nombre:</span><span>${conductor2.nombre}</span></div>
                                <div class="reporte-row"><span class="reporte-label">Legajo:</span><span>${conductor2.legajo}</span></div>
                                <div class="reporte-row"><span class="reporte-label">DNI:</span><span>${conductor2.dni}</span></div>
                                <div class="reporte-row"><span class="reporte-label">Vto Reg:</span><span>${vtoReg2}</span></div>
                            </div>
                        </div>
                        
                        <div class="reporte-section">
                            <div class="reporte-section-title">💰 OBSERVACIONES DE GASTOS</div>
                            <div class="reporte-value" style="font-style:italic;">${orden.obs_gastos || 'Sin observaciones'}</div>
                        </div>
                        
                        <div class="reporte-section">
                            <div class="reporte-section-title">📏 KILOMETRAJE</div>
                            <div class="reporte-row"><span class="reporte-label">Km al iniciar:</span><span class="reporte-value">_______________</span></div>
                            <div class="reporte-row"><span class="reporte-label">Km al finalizar:</span><span class="reporte-value">_______________</span></div>
                            <div class="reporte-row"><span class="reporte-label">Total Km:</span><span class="reporte-value">_______________</span></div>
                        </div>
                    </div>
                `;
                
                const hojaConBotones = `
                    <div class="reporte-actions">
                        <button class="btn-print" onclick="window.imprimirHojaActual()">🖨️ Imprimir</button>
                        <button class="btn-pdf" onclick="window.generarPDFHojaActual()">📄 Compartir PDF</button>
                    </div>
                    ${hojaHtml}
                `;
                
                window.modalModo = 'detalle';
                document.getElementById('modal-titulo').textContent = `📋 HOJA DE RUTA - Viaje N° ${orden.id}`;
                document.getElementById('modal-campos').innerHTML = hojaConBotones;
                document.getElementById('modal-footer').style.display = 'none';
                document.getElementById('modal').classList.add('show');
                
                window.imprimirHojaActual = () => imprimirReporteOrden(hojaHtml);
                window.generarPDFHojaActual = () => generarPDFOrden(hojaHtml);
                
            } catch (error) {
                mostrarToast('Error al cargar el detalle: ' + error.message, true);
            }
        };

        window.iniciarSesion = async () => {
            const usuario = document.getElementById('loginUsuario').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!usuario || !password) {
                document.getElementById('loginError').textContent = 'Complete ambos campos';
                return;
            }
            
            document.getElementById('loginError').textContent = '';
            
            try {
                const { data, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('usuario', usuario)
                    .eq('contraseña', password);
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    document.getElementById('loginError').textContent = 'Usuario o contraseña incorrectos';
                    return;
                }
                
                const user = data[0];
                const rol = user.nivel;
                
                if (!configPermisos[rol]) {
                    document.getElementById('loginError').textContent = 'Rol de usuario no reconocido';
                    return;
                }
                
                window.usuarioActual = user;
                window.permisos = configPermisos[rol];
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('userInfo').innerHTML = `${user.nombre}<br><span style="font-size:0.7rem; color:#94a3b8;">${rol}</span>`;
                
                generarSidebar();
                
                const tablasPermitidas = getTablasPermitidas();
                if (tablasPermitidas.length > 0) {
                    window.cargarTabla(tablasPermitidas[0].id);
                }
                
            } catch (error) {
                document.getElementById('loginError').textContent = 'Error de conexión';
                console.error(error);
            }
        };
        
        window.cerrarSesion = () => {
            window.usuarioActual = null;
            window.permisos = null;
            window.tablaActual = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
            document.getElementById('loginUsuario').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').textContent = '';
        };
    </script>
</body>
</html>
